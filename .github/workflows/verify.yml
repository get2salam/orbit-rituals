name: verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run static verification and scoring tests
        run: npm test
