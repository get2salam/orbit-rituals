name: verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check asset references in index.html and README.md
        run: node tools/verify-links.mjs
